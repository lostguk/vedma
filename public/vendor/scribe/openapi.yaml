openapi: 3.0.3
info:
  title: 'API Магических Товаров'
  description: 'API для интеграции с магазином магических товаров. Позволяет просматривать категории и товары, а также регистрировать новых пользователей.'
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8080'
tags:
  -
    name: Аутентификация
    description: "\nAPI для регистрации и авторизации пользователей\n\nДля работы с API вам необходимо зарегистрировать пользователя через эндпоинт `POST /api/v1/register`.\nПосле успешной регистрации вы получите доступ ко всем эндпоинтам API.\n\n## Формат регистрационных данных\n\nРегистрационные данные должны быть отправлены в формате JSON с необходимыми полями:\n- `first_name` - Имя пользователя\n- `last_name` - Фамилия пользователя\n- `email` - Электронный адрес (должен быть уникальным)\n- `password` - Пароль (минимум 8 символов)\n\nОстальные поля являются опциональными:\n- `middle_name` - Отчество\n- `phone` - Номер телефона\n- `address` - Адресные данные"
  -
    name: Доставка
    description: 'Позволяет рассчитать стоимость доставки на основе списка товаров и адреса доставки.'
  -
    name: 'Заказы пользователя'
    description: ''
  -
    name: Категории
    description: "\nAPI для работы с категориями товаров\n\nКатегории представляют иерархическую структуру типов товаров магазина.\nКаждая категория может иметь родительскую категорию и дочерние категории,\nчто позволяет строить многоуровневое дерево категорий.\n\n## Структура категории\n\nКаждая категория содержит следующие основные поля:\n- `id` - Уникальный идентификатор категории\n- `name` - Название категории\n- `slug` - Уникальный текстовый идентификатор для URL\n- `description` - Описание категории\n- `icon` - URL иконки категории\n- `parent_id` - ID родительской категории (null для корневых категорий)\n- `sort_order` - Порядок сортировки\n- `is_visible` - Флаг видимости категории\n- `children` - Массив дочерних категорий (если запрошены)\n\n## Использование API категорий\n\nAPI категорий позволяет получить как полный список категорий с их иерархией,\nтак и детальную информацию по отдельной категории. Для идентификации конкретной\nкатегории используется её slug (например, \"ritualnye-svechi\")."
  -
    name: 'Общие эндпоинты'
    description: ''
  -
    name: 'Оформление заказа'
    description: ''
  -
    name: Продукты
    description: "\nAPI для работы с продуктами магазина"
  -
    name: Профиль
    description: ''
  -
    name: Системные
    description: 'Этот endpoint отправляет тестовое письмо на указанный email для проверки работоспособности почтовой системы.'
  -
    name: Страницы
    description: ''
  -
    name: 'Темы и сообщения'
    description: "\nAPI для работы с темами обращений и сообщениями пользователей\n\nТемы обращений представляют собой диалоги между пользователем и администратором.\nКаждая тема может содержать множество сообщений от пользователя и администратора.\n\n## Структура темы\n\nКаждая тема содержит следующие основные поля:\n- `id` - Уникальный идентификатор темы\n- `title` - Название темы\n- `status` - Статус темы (new, resolved, requires_response)\n- `user_id` - ID пользователя, создавшего тему.\n- `messages` - Массив сообщений в теме (если запрошены)\n\n## Структура сообщения\n\nКаждое сообщение содержит следующие основные поля:\n- `id` - Уникальный идентификатор сообщения\n- `content` - Текст сообщения\n- `user_id` - ID пользователя, отправившего сообщение.\n- `topic_id` - ID темы, к которой относится сообщение.\n- `attachments` - Массив вложений к сообщению (если есть)"
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Вставьте Bearer-токен, полученный через /login.'
security:
  -
    default: []
paths:
  /api/v1/register:
    post:
      summary: 'Регистрация нового пользователя'
      operationId: ''
      description: "Этот эндпоинт позволяет создать нового пользователя. После успешной регистрации возвращается токен доступа\nи данные пользователя. Обязательными полями являются first_name, last_name, email и password."
      parameters: []
      responses:
        201:
          description: 'Успешная регистрация'
          content:
            application/json:
              schema:
                type: object
                example:
                  token: 9|MfOSV0Iqv4yGIJZGMhUZpzb4Yjs24rGhQHZJ7zOY
                  user:
                    id: 11
                    first_name: Иван
                    last_name: Иванов
                    middle_name: Иванович
                    email: user@example.com
                    email_verified_at: null
                    phone: '+7 (999) 123-45-67'
                    address: 'ул. Пушкина, д. 1'
                    created_at: '2023-04-04T12:30:45.000000Z'
                    updated_at: '2023-04-04T12:30:45.000000Z'
                properties:
                  token:
                    type: string
                    example: 9|MfOSV0Iqv4yGIJZGMhUZpzb4Yjs24rGhQHZJ7zOY
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 11
                      first_name:
                        type: string
                        example: Иван
                      last_name:
                        type: string
                        example: Иванов
                      middle_name:
                        type: string
                        example: Иванович
                      email:
                        type: string
                        example: user@example.com
                      email_verified_at:
                        type: string
                        example: null
                      phone:
                        type: string
                        example: '+7 (999) 123-45-67'
                      address:
                        type: string
                        example: 'ул. Пушкина, д. 1'
                      created_at:
                        type: string
                        example: '2023-04-04T12:30:45.000000Z'
                      updated_at:
                        type: string
                        example: '2023-04-04T12:30:45.000000Z'
        422:
          description: 'Ошибка валидации'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'The given data was invalid.'
                  errors:
                    email:
                      - 'The email has already been taken.'
                properties:
                  message:
                    type: string
                    example: 'The given data was invalid.'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'The email has already been taken.'
                        items:
                          type: string
      tags:
        - Аутентификация
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                  description: 'Имя пользователя.'
                  example: Иван
                  nullable: false
                last_name:
                  type: string
                  description: 'Фамилия пользователя.'
                  example: Иванов
                  nullable: false
                middle_name:
                  type: string
                  description: 'Отчество пользователя.'
                  example: Иванович
                  nullable: false
                email:
                  type: string
                  description: 'Email пользователя (должен быть уникальным).'
                  example: user@example.com
                  nullable: false
                password:
                  type: string
                  description: 'Пароль (минимум 8 символов).'
                  example: password123
                  nullable: false
                password_confirmation:
                  type: string
                  description: 'Пароль (минимум 8 символов).'
                  example: password123
                  nullable: false
                phone:
                  type: string
                  description: 'Номер телефона в формате +7 (XXX) XXX-XX-XX.'
                  example: '+7 (999) 123-45-67'
                  nullable: true
                address:
                  type: string
                  description: Адрес.
                  example: 'ул. Пушкина, д. 1'
                  nullable: true
              required:
                - first_name
                - last_name
                - middle_name
                - email
                - password
                - password_confirmation
      security: []
  /api/v1/login:
    post:
      summary: 'Вход в систему'
      operationId: ''
      description: "Позволяет получить токен доступа по email и паролю.\nПосле успешной аутентификации возвращается токен доступа и данные пользователя."
      parameters: []
      responses:
        200:
          description: 'Успешный вход'
          content:
            text/plain:
              schema:
                type: string
                example: "{\n    \"status\": \"success\",\n    \"message\": \"Login successful\",\n    \"data\": {\n        \"user\": {\n            \"id\": 1,\n            \"first_name\": \"Иван\",\n            \"last_name\": \"Иванов\",\n            \"middle_name\": \"Иванович\",\n            \"full_name\": \"Иванов Иван Иванович\",\n            \"email\": \"user@example.com\",\n            \"phone\": \"+79001234567\",\n            \"address\": \"Россия\"\n            \"email_verified\": true,\n            \"created_at\": \"2023-01-01T00:00:00+00:00\",\n            \"updated_at\": \"2023-01-01T00:00:00+00:00\"\n        },\n        \"token\": \"1|laravel_sanctum_hashed_token_example_123456789\"\n    }\n}"
        422:
          description: 'Ошибка валидации'
          content:
            application/json:
              schema:
                type: object
                example:
                  status: error
                  message: 'The given data was invalid.'
                  errors:
                    email:
                      - 'Указанные учетные данные не соответствуют нашим записям.'
                    password:
                      - 'Пароль должен содержать не менее 8 символов.'
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: 'The given data was invalid.'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'Указанные учетные данные не соответствуют нашим записям.'
                        items:
                          type: string
                      password:
                        type: array
                        example:
                          - 'Пароль должен содержать не менее 8 символов.'
                        items:
                          type: string
      tags:
        - Аутентификация
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Email пользователя.'
                  example: user@example.com
                  nullable: false
                password:
                  type: string
                  description: 'Пароль пользователя.'
                  example: password123
                  nullable: false
              required:
                - email
                - password
      security: []
  /api/v1/forgot-password:
    post:
      summary: 'Запрос на сброс пароля'
      operationId: ''
      description: 'Отправляет пользователю на email ссылку для сброса пароля, если пользователь существует.'
      parameters: []
      responses:
        200:
          description: 'Ссылка отправлена'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Ссылка на смену пароля отправлена.'
                properties:
                  message:
                    type: string
                    example: 'Ссылка на смену пароля отправлена.'
      tags:
        - Аутентификация
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Email пользователя.'
                  example: user@example.com
                  nullable: false
              required:
                - email
      security: []
  /api/v1/reset-password:
    post:
      summary: 'Сброс пароля'
      operationId: ''
      description: 'Позволяет установить новый пароль, используя email и временный токен.'
      parameters: []
      responses:
        200:
          description: 'Пароль успешно изменён'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Пароль успешно изменён.'
                properties:
                  message:
                    type: string
                    example: 'Пароль успешно изменён.'
        422:
          description: 'Неверный или просроченный токен'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'The given data was invalid.'
                  errors:
                    token:
                      - 'Неверный или просроченный токен'
                properties:
                  message:
                    type: string
                    example: 'The given data was invalid.'
                  errors:
                    type: object
                    properties:
                      token:
                        type: array
                        example:
                          - 'Неверный или просроченный токен'
                        items:
                          type: string
      tags:
        - Аутентификация
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Email пользователя.'
                  example: user@example.com
                  nullable: false
                token:
                  type: string
                  description: 'Токен сброса, полученный из email.'
                  example: abc123
                  nullable: false
                password:
                  type: string
                  description: 'Новый пароль (минимум 8 символов).'
                  example: NewPassword456
                  nullable: false
                password_confirmation:
                  type: string
                  description: 'Подтверждение нового пароля.'
                  example: NewPassword456
                  nullable: false
              required:
                - email
                - token
                - password
                - password_confirmation
      security: []
  /api/v1/logout:
    post:
      summary: ''
      operationId: postApiV1Logout
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Аутентификация
  /api/v1/change-password:
    post:
      summary: 'Смена пароля'
      operationId: ''
      description: "Этот эндпоинт позволяет сменить пароль авторизованного пользователя.\nТекущий пароль проверяется автоматически на валидность."
      parameters: []
      responses:
        200:
          description: 'Успешная смена пароля'
          content:
            text/plain:
              schema:
                type: string
                example: "{\n  \"message\": \"Пароль успешно обновлён.\",\n  \"user\": {\n    \"id\": 1,\n    \"first_name\": \"Иван\",\n    \"last_name\": \"Иванов\",\n    \"email\": \"user@example.com\",\n    ...\n  }\n}"
        422:
          description: 'Ошибка валидации'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'The given data was invalid.'
                  errors:
                    current_password:
                      - 'Текущий пароль указан неверно.'
                properties:
                  message:
                    type: string
                    example: 'The given data was invalid.'
                  errors:
                    type: object
                    properties:
                      current_password:
                        type: array
                        example:
                          - 'Текущий пароль указан неверно.'
                        items:
                          type: string
      tags:
        - Аутентификация
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                current_password:
                  type: string
                  description: 'Текущий пароль.'
                  example: oldpassword123
                  nullable: false
                new_password:
                  type: string
                  description: 'Новый пароль (не менее 8 символов).'
                  example: newpassword456
                  nullable: false
                new_password_confirmation:
                  type: string
                  description: 'Подтверждение нового пароля.'
                  example: newpassword456
                  nullable: false
              required:
                - current_password
                - new_password
                - new_password_confirmation
  '/api/v1/verify-registration/{user}/{hash}':
    get:
      summary: 'Подтверждение email адреса'
      operationId: Email
      description: "Этот эндпоинт используется для подтверждения email адреса пользователя.\nСсылка генерируется автоматически при регистрации и отправляется на email.\nСсылка действительна в течение 60 минут и содержит цифровую подпись для безопасности."
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  -
                    description: 'Успешное подтверждение'
                    type: object
                    example:
                      message: 'Email успешно подтвержден'
                    properties:
                      message:
                        type: string
                        example: 'Email успешно подтвержден'
                  -
                    description: 'Email уже подтвержден'
                    type: object
                    example:
                      message: 'Email адрес уже подтвержден'
                    properties:
                      message:
                        type: string
                        example: 'Email адрес уже подтвержден'
        403:
          description: 'Неверная ссылка'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'Неверная или истекшая ссылка подтверждения'
                properties:
                  message:
                    type: string
                    example: 'Неверная или истекшая ссылка подтверждения'
        404:
          description: 'Пользователь не найден'
          content:
            application/json:
              schema:
                type: object
                example:
                  message: 'User not found'
                properties:
                  message:
                    type: string
                    example: 'User not found'
      tags:
        - Аутентификация
      security: []
    parameters:
      -
        in: path
        name: user
        description: 'ID пользователя.'
        example: 1
        required: true
        schema:
          type: integer
      -
        in: path
        name: hash
        description: 'Хеш email адреса (sha1).'
        example: 5baa61e4c9b93f3f0682250b6cf8331b7ee68fd8
        required: true
        schema:
          type: string
  /api/v1/shipping/calculate:
    post:
      summary: 'Расчёт стоимости доставки (Metaship) 4444444'
      operationId: Metaship4444444
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: success
                  message: Success
                  data:
                    price: 350
                    options:
                      -
                        carrier: CDEK
                        service: Курьер
                        price: 350
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Success
                  data:
                    type: object
                    properties:
                      price:
                        type: integer
                        example: 350
                      options:
                        type: array
                        example:
                          -
                            carrier: CDEK
                            service: Курьер
                            price: 350
                        items:
                          type: object
                          properties:
                            carrier:
                              type: string
                              example: CDEK
                            service:
                              type: string
                              example: Курьер
                            price:
                              type: integer
                              example: 350
      tags:
        - Доставка
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                products:
                  type: array
                  description: 'Список товаров для расчёта. Каждый элемент содержит id товара и количество.'
                  example:
                    -
                      id: 1
                      quantity: 2
                    -
                      id: 5
                      quantity: 1
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: 'ID товара из каталога. The <code>id</code> of an existing record in the products table.'
                        example: 1
                        nullable: false
                      quantity:
                        type: integer
                        description: 'Количество единиц товара (не менее 1).'
                        example: 2
                        nullable: false
                    required:
                      - id
                      - quantity
                address:
                  type: string
                  description: 'Адрес доставки в формате с индексом (пример из доков Metaship). Поле value должно быть не меньше 5 символов. Поле value не может быть больше 255 символов.'
                  example: '191025, г Санкт-Петербург, Центральный р-н, Невский пр-кт, д 106'
                  nullable: false
              required:
                - products
                - address
      security: []
  /api/v1/orders:
    get:
      summary: 'Получить список заказов текущего пользователя'
      operationId: ''
      description: ''
      parameters:
        -
          in: query
          name: page
          description: 'Номер страницы.'
          example: 1
          required: false
          schema:
            type: integer
            description: 'Номер страницы.'
            example: 1
            nullable: false
        -
          in: query
          name: per_page
          description: 'Количество заказов на страницу.'
          example: 15
          required: false
          schema:
            type: integer
            description: 'Количество заказов на страницу.'
            example: 15
            nullable: false
      responses:
        200:
          description: Успешно
          content:
            text/plain:
              schema:
                type: string
                example: "{\n  \"status\": \"success\",\n  \"message\": \"Success\",\n  \"data\": {\n    \"current_page\": 1,\n    \"data\": [\n      {\"id\": 1, \"user_id\": 2, ...}\n    ],\n    ...\n  }\n}"
      tags:
        - 'Заказы пользователя'
  /api/v1/categories:
    get:
      summary: 'Получение списка категорий'
      operationId: ''
      description: "Возвращает список всех категорий магазина. По умолчанию включает все видимые категории.\nВы можете использовать параметр `show_hidden` для отображения скрытых категорий."
      parameters:
        -
          in: query
          name: show_hidden
          description: 'Показать скрытые категории.'
          example: false
          required: false
          schema:
            type: boolean
            description: 'Показать скрытые категории.'
            example: false
            nullable: false
        -
          in: query
          name: ids
          description: 'Список идентификаторов категорий.'
          example:
            - 1
            - 2
            - 3
          required: false
          schema:
            type: array
            description: 'Список идентификаторов категорий.'
            example:
              - 1
              - 2
              - 3
            items:
              type: string
      responses:
        200:
          description: 'Успешный запрос'
          content:
            application/json:
              schema:
                type: object
                example:
                  data:
