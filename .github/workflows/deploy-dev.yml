name: Deploy to Dev

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Check available secrets
        run: |
          if [ -z "${{ secrets.DEPLOY }}" ]; then
            echo "DEPLOY is not set"
          else
            echo "DEPLOY is set"
          fi
      - name: Setup SSH and Add Key to ssh-agent
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY }}" > ~/.ssh/server_key
          chmod 600 ~/.ssh/server_key
          ssh-keyscan -H 213.189.201.167 >> ~/.ssh/known_hosts
      - name: Deploy over SSH with Debugging
        run: |
          ssh deploy@213.189.201.167 -i ~/.ssh/server_key << 'EOF'
            set -euo pipefail
            set -x
            cd /opt/vedma-dev
            sudo rm -rf .scribe/endpoints.cache || true
            sudo chown -R $USER:$USER . || true
            git stash
            git pull origin dev
            docker-compose -f docker-compose.dev.yml down
            docker-compose -f docker-compose.dev.yml build
            docker-compose -f docker-compose.dev.yml up -d
            # wait for app container to become healthy (max ~60s)
            i=0; until [ "$i" -ge 30 ]; do
              STATUS=$(docker ps --filter "name=vedma_dev_app" --format "{{.Status}}")
              echo "App status: $STATUS"
              echo "$STATUS" | grep -qi "healthy" && break
              i=$((i+1))
              sleep 2
            done

            # Run migrations without dropping the database
            docker-compose -f docker-compose.dev.yml exec -T app php artisan migrate --force
            # Optionally seed if needed
            # docker-compose -f docker-compose.dev.yml exec -T app php artisan db:seed --force

            # Generate API docs
            echo "Generating Scribe docs..."
            if docker-compose -f docker-compose.dev.yml exec -T app php artisan scribe:generate -vvv --no-interaction --force; then
              echo "Scribe generation OK"
            else
              echo "Scribe generation FAILED"
            fi
            echo "Scribe generation finished. Verifying outputs..."
            docker-compose -f docker-compose.dev.yml exec -T app sh -lc 'ls -lah resources/views/scribe || true'
            docker-compose -f docker-compose.dev.yml exec -T app sh -lc 'ls -lah storage/app/scribe || true'
            # Verify docs route exists and is reachable
            docker-compose -f docker-compose.dev.yml exec -T app php artisan route:list | grep -i docs || true
            docker-compose -f docker-compose.dev.yml exec -T app sh -lc 'curl -s -o /dev/null -w "HTTP:%{http_code}\n" http://localhost:8080/docs || true'
            docker-compose -f docker-compose.dev.yml exec -T app php artisan optimize:clear
          EOF
