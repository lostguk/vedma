name: Deploy Production Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check available secrets
        run: |
          if [ -z "${{ secrets.DEPLOY }}" ]; then
            echo "DEPLOY is not set"
          else
            echo "DEPLOY is set"
          fi
      - name: Setup SSH and Add Key to ssh-agent
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY }}" > ~/.ssh/server_key
          chmod 600 ~/.ssh/server_key
          ssh-keyscan -H 95.163.241.226 >> ~/.ssh/known_hosts
      - name: Deploy production over SSH
        run: |
          ssh deploy@95.163.241.226 -i ~/.ssh/server_key << 'EOF'
            set -e
            cd /opt/vedma
            sudo rm -rf .scribe/endpoints.cache || true
            sudo chown -R $USER:$USER . || true
            git stash
            git pull origin main

            # Полная пересборка при изменениях Docker/Composer/NPM/конфигов контейнера
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              REBUILD_REQUIRED=$(git diff HEAD~1 HEAD --name-only | grep -E "(^Dockerfile|composer\.(json|lock)|package(-lock)?\.json|^docker/)" || true)
              if [ -n "$REBUILD_REQUIRED" ]; then
                echo "Обнаружены изменения в Docker/зависимостях, делаем полную пересборку..."
                docker compose -f docker-compose.production.yml build --no-cache
              else
                echo "Изменений в Docker нет, используем кэш..."
                docker compose -f docker-compose.production.yml build
              fi
            else
              echo "Первый коммит или нет истории, используем кэш..."
              docker compose -f docker-compose.production.yml build
            fi

            # Запускаем контейнеры
            docker compose -f docker-compose.production.yml up -d

            # Миграции, storage:link, кэш и перезапуск очереди
            docker compose -f docker-compose.production.yml exec -T app sh -lc '
              set -e
            php artisan storage:link || true
              php artisan filament:assets --no-interaction
              php artisan vendor:publish --tag=livewire:assets --force --no-interaction
              php artisan migrate --force
              php artisan optimize:clear
              php artisan config:cache
              php artisan route:cache
              php artisan view:cache
              php artisan queue:restart || true
            '

            # Очищаем старые образы (старше 3 дней)
            echo "Очистка старых образов..."
            docker image prune -a -f --filter "until=72h" || true
          EOF
